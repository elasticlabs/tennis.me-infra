services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command:
      - --base-url
      - /portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    restart: unless-stopped
    networks:
      - revproxy_apps

networks:
  revproxy_apps:
    external: true