services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config:/config
    restart: unless-stopped
    networks:
      - swag_net
      - revproxy_apps

networks:
  swag_net:
    name: swag_net
  revproxy_apps:
    external: true