server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.*;

    include /config/nginx/ssl.conf;
    include /config/nginx/snippets/security-headers.conf;
    include /config/nginx/snippets/oauth2-proxy.conf;

    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in;

    location = / {
        set $upstream http://homer:8080/;
        proxy_pass http://$upstream;
        include /config/nginx/snippets/proxy-common.conf;
    }

    location /portainer/ {
        set $upstream http://portainer:9000/;
        proxy_pass http://$upstream;
        include /config/nginx/snippets/proxy-common.conf;
    }

    location /grafana/ {
        set $upstream http://grafana:3000/;
        proxy_pass http://$upstream;
        include /config/nginx/snippets/proxy-common.conf;
    }

    location /cadvisor/ {
        set $upstream http://cadvisor:8080/;
        proxy_pass http://$upstream;
        include /config/nginx/snippets/proxy-common.conf;
    }

    location /files/ {
        set $upstream http://files:80/;
        proxy_pass http://$upstream;
        include /config/nginx/snippets/proxy-common.conf;
    }
}
