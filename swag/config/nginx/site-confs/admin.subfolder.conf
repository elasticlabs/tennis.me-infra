server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.*;

    include /config/nginx/ssl.conf;
    # include /config/nginx/snippets/security-headers.conf;

    #
    # At first leave commented, we need to configure oauth2-proxy and Keycloadk before enabling this
    # auth_request /oauth2/auth;
    # error_page 401 = /oauth2/sign_in;
    # include /config/nginx/snippets/oauth2-proxy.conf;

    location = / {
        proxy_pass http://homer:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /portainer {
        return 302 /portainer/;
    }

    location /portainer/ {
        proxy_pass http://portainer:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /grafana {
        return 302 /grafana/;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /cadvisor {
        return 302 /cadvisor/;
    }

    location /cadvisor/ {
        proxy_pass http://cadvisor:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /files {
        return 302 /files/;
    }

    location /files/ {
        proxy_pass http://files:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

}
