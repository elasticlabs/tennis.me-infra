services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      URL: ${SWAG_URL}
      SUBDOMAINS: ${SWAG_SUBDOMAINS}
      VALIDATION: ${SWAG_VALIDATION}
      ONLY_SUBDOMAINS: ${SWAG_ONLY_SUBDOMAINS}
      STAGING: ${SWAG_STAGING}
      EMAIL: ${ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./swag/config:/config
    restart: unless-stopped
    networks:
      - swag_net
      - revproxy_apps

  keycloak-postgresql:
    image: postgres:16
    container_name: keycloak-postgresql
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - ./keycloak/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: keycloak
    expose:
      - "8080"
      - "8443"
      - "9000"
    command:
      - start
      - --http-enabled=true
      - --proxy-headers=xforwarded
      - --hostname=${KEYCLOAK_HOSTNAME}
      - --hostname-strict=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgresql:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      - keycloak-postgresql
    restart: unless-stopped
    networks:
      - revproxy_apps

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command:
      - --base-url
      - /portainer
    expose:
      - "9000"
      - "9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  openobserve:
    image: ${OPENOBSERVE_IMAGE}
    container_name: openobserve
    expose:
      - "5080"
    environment:
      ZO_DATA_DIR: ${OPENOBSERVE_DATA_DIR}
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD}
      ZO_BASE_URI: ${OPENOBSERVE_BASE_URI}
      ZO_WEB_URL: ${OPENOBSERVE_PUBLIC_URL}
    volumes:
      - ./openobserve/data:/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    expose:
      - "8080"
    environment:
      TZ: ${TZ}
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY}
    volumes:
      - ./crowdsec/acquis:/etc/crowdsec/acquis.d
      - ./crowdsec/data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro
    restart: unless-stopped
    networks:
      - revproxy_apps
  
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    expose:
      - "3000"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: ${ADMIN_DOMAIN}
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - revproxy_apps

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    expose:
      - "4180"
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://auth.elasticlabs.co/realms/elasticlabs
      OAUTH2_PROXY_CLIENT_ID: admin-gateway
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://admin.elasticlabs.co/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_DOMAINS: .elasticlabs.co
      OAUTH2_PROXY_WHITELIST_DOMAINS: .elasticlabs.co
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SCOPE: "openid profile email"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    restart: unless-stopped
    networks:
      - revproxy_apps


networks:
  swag_net:
    external: true
    name: ${SWAG_NETWORK}

  revproxy_apps:
    external: true
    name: ${REVPROXY_APPS_NETWORK}