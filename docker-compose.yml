services:
  swag:
    image: linuxserver/swag:latest
    container_name: swag
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      URL: ${SWAG_URL}
      SUBDOMAINS: ${SWAG_SUBDOMAINS}
      VALIDATION: ${SWAG_VALIDATION}
      ONLY_SUBDOMAINS: ${SWAG_ONLY_SUBDOMAINS}
      STAGING: ${SWAG_STAGING}
      EMAIL: ${ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./swag/config:/config
    restart: unless-stopped
    networks:
      - swag_net
      - revproxy_apps

  keycloak-postgresql:
    image: postgres:16
    container_name: keycloak-postgresql
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    expose:
      - "5432"
    networks:
      - revproxy_apps

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: keycloak
    command:
      - start
      - --http-enabled=true
      - --proxy-headers=xforwarded
      - --hostname=${KEYCLOAK_HOSTNAME}
      - --hostname-strict=true
      - --metrics-enabled=true
      - --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgresql:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      - keycloak-postgresql
    restart: unless-stopped
    expose:
      - "8080"
      - "8443"
      - "9000"
    networks:
      - revproxy_apps

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://auth.${BASE_DOMAIN}/realms/elasticlabs
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://admin.${BASE_DOMAIN}/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_DOMAINS: .${BASE_DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: .${BASE_DOMAIN}
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SCOPE: "openid profile email"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    restart: unless-stopped
    expose:
      - "4180"
    networks:
      - revproxy_apps

  homer:
    build:
      context: ./homer
    container_name: homer
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - revproxy_apps

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command:
      - --base-url
      - /portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped
    expose:
      - "9000"
      - "9443"
    networks:
      - revproxy_apps

  grafana:
    build:
      context: ./grafana/grafana
    container_name: grafana
    environment:
      GF_SERVER_ROOT_URL: https://admin.${BASE_DOMAIN}/grafana/
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - revproxy_apps

  loki:
    build:
      context: ./grafana/loki
    container_name: loki
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    expose:
      - "3100"
    networks:
      - revproxy_apps

  prometheus:
    build:
      context: ./grafana/prometheus
    container_name: prometheus
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped
    expose:
      - "9090"
    networks:
      - revproxy_apps

  alloy:
    build:
      context: ./grafana/alloy
    container_name: alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    restart: unless-stopped
    expose:
      - "12345"
    networks:
      - revproxy_apps

  tempo:
    build:
      context: ./grafana/tempo
    container_name: tempo
    volumes:
      - tempo_data:/var/tempo
    restart: unless-stopped
    expose:
      - "3200"
      - "4317"
      - "4318"
    networks:
      - revproxy_apps

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.rootfs=/host
      - --collector.textfile.directory=/textfile
    pid: host
    volumes:
      - /:/host:ro,rslave
      - ./grafana/node-exporter/textfile:/textfile:ro
    restart: unless-stopped
    expose:
      - "9100"
    networks:
      - revproxy_apps

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - revproxy_apps

  files:
    build:
      context: ./filebrowser
    container_name: files
    environment:
      FILEBROWSER_BASEURL: /files
      FILEBROWSER_ADDRESS: 0.0.0.0
      FILEBROWSER_PORT: "80"
      FILEBROWSER_ROOT: /srv
      FILEBROWSER_LOG: stdout
      FILEBROWSER_NOAUTH: "true"
    volumes:
      - keycloak_postgres_data:/srv/keycloak-postgres:ro
      - portainer_data:/srv/portainer:ro
      - grafana_data:/srv/grafana:ro
      - loki_data:/srv/loki:ro
      - prometheus_data:/srv/prometheus:ro
      - tempo_data:/srv/tempo:ro
      - ./swag/config:/srv/swag:ro
      - files_database:/database
      - files_config:/config
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - revproxy_apps

networks:
  swag_net:
    external: true
    name: ${SWAG_NETWORK}
  revproxy_apps:
    external: true
    name: ${REVPROXY_APPS_NETWORK}

volumes:
  keycloak_postgres_data:
  portainer_data:
  grafana_data:
  loki_data:
  prometheus_data:
  tempo_data:
  files_database:
  files_config:
