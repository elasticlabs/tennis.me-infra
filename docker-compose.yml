services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      URL: ${SWAG_URL}
      SUBDOMAINS: ${SWAG_SUBDOMAINS}
      VALIDATION: ${SWAG_VALIDATION}
      ONLY_SUBDOMAINS: ${SWAG_ONLY_SUBDOMAINS}
      STAGING: ${SWAG_STAGING}
      EMAIL: ${ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./swag/config:/config
    restart: unless-stopped
    networks:
      - swag_net
      - revproxy_apps

  authentik-postgresql:
    image: postgres:16
    container_name: authentik-postgresql
    environment:
      POSTGRES_DB: ${AUTHENTIK_POSTGRES_DB}
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    volumes:
      - ./authentik/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  authentik-redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    networks:
      - revproxy_apps

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - ./authentik/data/media:/media
      - ./authentik/data/custom-templates:/templates
    restart: unless-stopped
    networks:
      - revproxy_apps

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-worker
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - ./authentik/data/media:/media
      - ./authentik/data/certs:/certs
      - ./authentik/data/custom-templates:/templates
    restart: unless-stopped
    networks:
      - revproxy_apps

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command:
      - --base-url
      - /portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD}
      ZO_BASE_URI: ${OPENOBSERVE_BASE_URI}
      ZO_WEB_URL: ${OPENOBSERVE_PUBLIC_URL}
    volumes:
      - ./openobserve/data:/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  restic:
    image: restic/restic:latest
    container_name: restic
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
    volumes:
      - ./restic/repo:/repo
      - ./:/workspace:ro
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    restart: unless-stopped
    networks:
      - revproxy_apps

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    environment:
      TZ: ${TZ}
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY}
    volumes:
      - ./crowdsec/acquis:/etc/crowdsec/acquis.d
      - ./crowdsec/data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro
    restart: unless-stopped
    networks:
      - revproxy_apps

networks:
  swag_net:
    external: true
    name: ${SWAG_NETWORK}

  revproxy_apps:
    external: true
    name: ${REVPROXY_APPS_NETWORK}