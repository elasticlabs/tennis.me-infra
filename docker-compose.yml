services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      URL: ${SWAG_URL}
      SUBDOMAINS: ${SWAG_SUBDOMAINS}
      VALIDATION: ${SWAG_VALIDATION}
      ONLY_SUBDOMAINS: ${SWAG_ONLY_SUBDOMAINS}
      STAGING: ${SWAG_STAGING}
      EMAIL: ${ADMIN_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./swag/config:/config
    restart: unless-stopped
    networks:
      - swag_net
      - revproxy_apps

  authentik-postgresql:
    image: postgres:16
    container_name: authentik-postgresql
    environment:
      POSTGRES_DB: ${AUTHENTIK_POSTGRES_DB}
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    volumes:
      - ./authentik/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  authentik-redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    networks:
      - revproxy_apps

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - ./authentik/data/media:/media
      - ./authentik/data/custom-templates:/templates
    restart: unless-stopped
    networks:
      - revproxy_apps
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-worker
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - ./authentik/data/media:/media
      - ./authentik/data/certs:/certs
      - ./authentik/data/custom-templates:/templates
    restart: unless-stopped
    networks:
      - revproxy_apps

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command:
      - --base-url
      - /portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    restart: unless-stopped
    networks:
      - revproxy_apps

  openobserve:
    image: ${OPENOBSERVE_IMAGE}
    container_name: openobserve
    environment:
      ZO_DATA_DIR: ${OPENOBSERVE_DATA_DIR}
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD}
      ZO_BASE_URI: ${OPENOBSERVE_BASE_URI}
      ZO_WEB_URL: ${OPENOBSERVE_PUBLIC_URL}
    volumes:
      - ./openobserve/data:${OPENOBSERVE_DATA_DIR}
    restart: unless-stopped
    networks:
      - revproxy_apps

  kopia:
    image: ${KOPIA_IMAGE}
    container_name: kopia
    command:
      - server
      - start
      - --insecure
      - --address=${KOPIA_SERVER_HOST}:${KOPIA_SERVER_PORT}
      - --server-username=${KOPIA_USERNAME}
      - --server-password=${KOPIA_PASSWORD}
      - --config-file=${KOPIA_CONFIG_PATH}/repository.config
      - --log-dir=${KOPIA_LOG_DIR}
      - --cache-directory=${KOPIA_CACHE_DIR}
    environment:
      TZ: ${TZ}
      USER: ${PUID}
      KOPIA_PASSWORD: ${KOPIA_PASSWORD}
    volumes:
      - ./kopia/config:${KOPIA_CONFIG_PATH}
      - ./kopia/logs:${KOPIA_LOG_DIR}
      - ./kopia/cache:${KOPIA_CACHE_DIR}
      - ./kopia/tmp:/tmp:shared
      - ./kopia/sources:/sources:ro
      - ./kopia/repository:${KOPIA_REPOSITORY_PATH}
    restart: unless-stopped
    networks:
      - revproxy_apps

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    environment:
      TZ: ${TZ}
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY}
    volumes:
      - ./crowdsec/acquis:/etc/crowdsec/acquis.d
      - ./crowdsec/data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro
    restart: unless-stopped
    networks:
      - revproxy_apps

networks:
  swag_net:
    external: true
    name: ${SWAG_NETWORK}
  revproxy_apps:
    external: true
    name: ${REVPROXY_APPS_NETWORK}